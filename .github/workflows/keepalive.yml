name: Supabase keep-alive

# Supabase 무료 티어는 약 7일 미사용 시 프로젝트를 일시정지한다(그러면 배포된 앱이
# 갑자기 죽은 것처럼 보임). 하루 두 번 REST 를 가볍게 호출해 DB 활동을 유지한다.
# 호출에 쓰는 anon/publishable 키는 공개 설계 값(비밀 아님) — RLS 로 데이터는 보호됨.

on:
  schedule:
    - cron: "17 3,15 * * *" # 매일 2회 (UTC) — 미사용 pause 방지엔 충분
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST (keeps DB active)
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            "https://tqegatiuembcvphxmujl.supabase.co/rest/v1/couples?select=id&limit=1" \
            -H "apikey: sb_publishable_JxofXpqHGa6lmxzOnvHGnw_yUG4RtP2")
          echo "REST ping → HTTP $code"
          test "$code" = "200"
