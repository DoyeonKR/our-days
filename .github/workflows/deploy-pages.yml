name: Deploy to GitHub Pages

# main 에 push 하면 정적 export 를 빌드해 GitHub Pages 로 배포.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Pages 배포는 큐잉(취소 X) — 연속 push 시 배포들이 서로 취소돼 'Deployment cancelled'
# 로 실패하던 문제 방지(GitHub Pages 공식 권장값). 순서대로 하나씩 배포된다.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 배포 전 게이트: 타입체크 + 유닛 테스트 통과해야만 build/deploy 진행
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npx eslint src --max-warnings=0
      - name: Unit tests
        run: npm test

  build:
    needs: test
    # PR 은 테스트 게이트까지만 — 배포는 main push 에서만
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure Pages (없으면 자동 활성화)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # npm ci 대신 install: Tailwind v4 oxide 의 플랫폼별 optional deps(@emnapi/*)를
      # macOS 에서 만든 lockfile 이 Linux 용으로 완전히 못 담는 npm 버그 회피.
      - run: npm install --no-audit --no-fund

      - name: Build (정적 export)
        run: npm run build
        env:
          # GitHub Pages 프로젝트 사이트 하위경로
          NEXT_PUBLIC_BASE_PATH: /our-days
          # 커플 연동(Supabase) — 공개용 publishable 키. repo secrets 에서 주입.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # 웹 푸시 공개키(VAPID) — 공개용, 클라이언트 노출 정상.
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}

      - name: Jekyll 비활성화(_next 디렉터리 보존)
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          # Pages 백엔드가 느릴 때 10분 기본 타임아웃으로 실패하던 것 완화(20분)
          timeout: 1200000
