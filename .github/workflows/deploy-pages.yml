name: Deploy to GitHub Pages

# main 에 push 하면 정적 export 를 빌드해 GitHub Pages 로 배포.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1개만 (진행 중이면 최신으로 대체)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages (없으면 자동 활성화)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - run: npm ci

      - name: Build (정적 export)
        run: npm run build
        env:
          # GitHub Pages 프로젝트 사이트 하위경로
          NEXT_PUBLIC_BASE_PATH: /our-days
          # 커플 연동(Supabase) — 공개용 publishable 키. repo secrets 에서 주입.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Jekyll 비활성화(_next 디렉터리 보존)
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
